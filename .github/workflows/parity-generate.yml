name: parity-generate
on:
  workflow_dispatch:

# Canonical golden generator. Goldens are the SwiftShader-rendered hashes
# produced on GitHub-hosted runners; developer-machine output must never land
# in tests/parity/goldens/. Dispatch this workflow manually whenever a
# deliberate visual change requires regenerating goldens. It commits straight
# back to the dispatching branch — reviewers then see the .hash diff in the PR.
#
# Decision: commit-to-same-branch (vs. peter-evans/create-pull-request). We're
# already on a PR branch when dispatching, and the per-PR parity check re-runs
# after the commit lands, giving automatic verification without a second PR.

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          persist-credentials: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium (with SwiftShader)
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate goldens
        run: pnpm parity:generate

      - name: Commit regenerated goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/parity/goldens
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
            exit 0
          fi
          git commit -m "chore(parity): regenerate goldens"
          git push origin HEAD:${GITHUB_REF_NAME}
